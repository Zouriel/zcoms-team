name: ci
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - name: gofmt -s
        run: |
          fmtout="$(gofmt -s -l .)"
          if [ -n "$fmtout" ]; then echo "unformatted files:"; echo "$fmtout"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint (new code)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --new-from-rev=origin/master ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
